version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud_sanitizer_backend
    # Exposing the port directly (optional if using nginx reverse proxy exclusively)
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist the local SQLite Database on the host machine
      - ./backend/users.db:/app/users.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud_sanitizer_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
