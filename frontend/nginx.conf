server {
    listen 80;
    server_name sanitize.aevonic.com localhost;

    # Serve the React application
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router DOM to maintain history across URL reloads
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy settings for API calls to the backend
    # This prevents CORS issues entirely and masks the backend completely.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
